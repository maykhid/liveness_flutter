name: liveness_flutter
description: >-
  Plug-and-play, customizable liveness detection for Flutter. Drive a sequence
  of liveness actions (blink, smile, nod, head turns, and more), capture images
  and/or video, and send results to your own backend.
version: 0.4.1
homepage: https://github.com/henryifebunandu/liveness_flutter
repository: https://github.com/henryifebunandu/liveness_flutter

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.13.0
  image: ^4.3.0
  http: ^1.2.0
  screen_brightness: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
